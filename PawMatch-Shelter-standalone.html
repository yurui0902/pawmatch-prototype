/* ios-frame.jsx */

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{

    <div key={k} style={{
      height: 42, borderRadius: 8.5,

    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',

      display: 'flex', flexDirection: 'column', alignItems: 'center',

    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

function Constellation({ width = 200, height = 120, color = '#F5C26B', style }) {

      <circle cx="180" cy="60" r="2.5" fill={color}/>

// Scattered stars background (subtle)
function StarField({ count = 30, color = '#F5C26B', opacity = 0.5, seed = 1 }) {
  // deterministic positions
  const rand = (i) => {
    const x = Math.sin(i * 9301 + seed * 49297) * 233280;
    return x - Math.floor(x);
  };
  const stars = Array.from({ length: count }, (_, i) => ({
    x: rand(i) * 100,
    y: rand(i + 100) * 100,
    r: 0.6 + rand(i + 200) * 1.3,
  }));
  return (
    <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none"
      style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
      {stars.map((s, i) => (
        <circle key={i} cx={s.x} cy={s.y} r={s.r * 0.3} fill={color} opacity={opacity}/>
      ))}
    </svg>
  );
}

      <path d="M14 12 C 9 12, 7 16, 8 19 C 9 23, 12 24, 14 24 C 16 24, 19 23, 20 19 C 21 16, 19 12, 14 12 Z" fill={color}/>
    </svg>
  );
}

/* ui.jsx */
// ui.jsx — design system: colors, typography, shared UI primitives

const PM = {

// ─── Pet illustration "photo" — bg + line drawing ─────────

function PetPortrait({ petKey, size = 280, rounded = 36, showCorner = true }) {

        </svg>

function SplashFX() {
  return (
    <>
      <style>{`
        @keyframes pm-bob {
          0%, 100% { transform: translateY(0); }
          50%      { transform: translateY(-7px); }

        @keyframes pm-heart-float {
          0%   { transform: translateY(24px) scale(0.55) rotate(-6deg); opacity: 0; }

      <div className="pm-fx">
        <span className="pm-heart" style={{ left: '18%', animationDelay: '0s'   }}>♥</span>

        <span className="pm-spark" style={{ left:  '8%', top: '10%', animationDelay: '0s'   }}>✦</span>
        <span className="pm-spark" style={{ left: '88%', top: '14%', animationDelay: '0.7s' }}>✦</span>

}

// ─── Empty state ───────────────────────────────────────────

function EmptyState({ title, sub, cta, onCta, icon }) {

/* screens-shelter-forms.jsx */
// screens-shelter-forms.jsx — Application queue + multi-stage review.

function stageMeta(key) {
  return APP_STAGES.find(s => s.key === key) || APP_STAGES[0];
}

function ShelterFormsScreen({ goto, tab, setTab, initialSeg, hideTabBar, apps, highlightApplicant }) {
  const data = apps || APPLICATIONS;
  const [seg, setSeg] = React.useState(initialSeg || 'all');
  const segments = [['all', `All ${data.length}`], ...APP_STAGES.map(s => {
    const n = data.filter(a => a.stage === s.key).length;
    return [s.key, `${s.label} · ${n}`];
  })];
  const list = seg === 'all' ? data : data.filter(a => a.stage === seg);

  return (
    <div style={{ position: 'absolute', inset: 0, background: PM.cream, display: 'flex', flexDirection: 'column' }}>
      <TopBar title="Applications" large subtitle="Review, message, decide — all in one queue."/>

      <div style={{ padding: '0 20px 8px' }}>
        <div style={{ display: 'flex', gap: 6, overflowX: 'auto', padding: 4,
                      background: PM.white, borderRadius: 16, border: `1px solid ${PM.line}` }}>
          {segments.map(([k, l]) => (
            <button key={k} onClick={() => setSeg(k)} style={{
              flexShrink: 0, height: 34, padding: '0 14px', borderRadius: 12, border: 'none', cursor: 'pointer',
              background: seg===k ? PM.night : 'transparent',
              color:      seg===k ? PM.cream : PM.inkSoft,
              fontFamily: FONT_BODY, fontSize: 11, fontWeight: 600, whiteSpace: 'nowrap',
            }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ flex: 1, overflow: 'auto', padding: '12px 20px 110px' }}>
        {list.length === 0 ? (
          <EmptyState
            title="Nothing in this stage"
            sub="When applicants reach this stage, they'll show up here."
            cta="See all applications"
            onCta={() => setSeg('all')}
          />

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {list.map(a => (
              <ApplicantRow
                key={a.id} app={a}
                highlight={highlightApplicant === a.applicant}
                onClick={() => goto('appReview', { id: a.id })}
              />
            ))}
          </div>
        )}
      </div>

      {!hideTabBar && <ShelterTabBar active={tab} onChange={setTab}/>}
    </div>
  );
}

  const sm = stageMeta(app.stage);

          <span style={{
            position: 'absolute', top: -8, right: 12,
            padding: '3px 9px', borderRadius: 9,

      }}>{app.initials}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <div style={{ fontFamily: FONT_DISPLAY, fontSize: 19, color: PM.night, letterSpacing: -0.2, lineHeight: 1.1 }}>{app.applicant}</div>
          <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: PM.inkFaint, letterSpacing: 0.4 }}>{highlight ? 'just now' : app.age}</div>
        </div>
        <div style={{ marginTop: 4, fontFamily: FONT_BODY, fontSize: 12, color: PM.inkSoft }}>
          for <strong style={{ color: PM.night }}>{pet ? pet.name : app.petKey}</strong> · {app.household} · {app.location}
        </div>
        <div style={{ marginTop: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{
            padding: '3px 8px', borderRadius: 8,
            background: sm.color + '22', color: sm.color,
            fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 0.4, textTransform: 'uppercase', fontWeight: 700,
          }}>{sm.label}</span>
        </div>
      </div>
    </button>
  );
}

// ─── Multi-stage application review ─────────────────────────

function ShelterAppReviewScreen({ app, onBack, goto, setTab }) {
  // local state — start at the application's current stage; let user walk through.
  const stageIdx = APP_STAGES.findIndex(s => s.key === (app && app.stage)) || 0;
  const [activeStage, setActiveStage] = React.useState(Math.max(0, stageIdx));
  const [decision, setDecision] = React.useState(null); // null | 'approved' | 'declined'
  const [pickedSlot, setPickedSlot] = React.useState(null);
  const demoState = (typeof useDemoState === 'function') ? useDemoState() : null;
  const isSarah = !!(app && app.applicant === 'Sarah Chen');
  // Only Sarah's row is plumbed into the live demo state; everyone else is local.
  const sentTime    = isSarah && demoState ? demoState.meetingTime     : null;
  const sentAccepted = isSarah && demoState ? demoState.meetingAccepted : false;

  if (!app) {
    return (
      <div style={{ position: 'absolute', inset: 0, background: PM.cream, padding: 40, fontFamily: FONT_BODY }}>
        Application not found. <button onClick={onBack}>Back</button>
      </div>
    );
  }
  const sm = APP_STAGES[activeStage];
  const pet = SHELTER_PETS.find(p => p.key === app.petKey);

  return (
    <div style={{ position: 'absolute', inset: 0, background: PM.cream, display: 'flex', flexDirection: 'column' }}>
      {/* header */}
      <div style={{
        background: `linear-gradient(135deg, ${PM.night} 0%, #2B2E66 100%)`, color: PM.cream,
        paddingTop: 56, paddingBottom: 22, paddingLeft: 20, paddingRight: 20,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <button onClick={onBack} style={{
            width: 36, height: 36, borderRadius: 18, border: 'none', cursor: 'pointer',
            background: 'rgba(255,255,255,0.12)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <svg width="13" height="13" viewBox="0 0 13 13"><path d="M8 1 L 3 6.5 L 8 12" stroke={PM.cream} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: PM.coralSoft, letterSpacing: 1.5, textTransform: 'uppercase' }}>
            Application · {app.age}
          </div>
          <div style={{ width: 36 }}/>
        </div>
        <div style={{ marginTop: 14, display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{
            width: 56, height: 56, borderRadius: 28, background: sm.color,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: FONT_DISPLAY, fontSize: 20, color: '#FFF', letterSpacing: -0.3,
          }}>{app.initials}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h1 style={{ margin: 0, fontFamily: FONT_DISPLAY, fontSize: 28, fontWeight: 400, letterSpacing: -0.4, lineHeight: 1.1 }}>
              {app.applicant}
            </h1>
            <div style={{ marginTop: 2, fontFamily: FONT_BODY, fontSize: 12, color: 'rgba(252,246,236,0.7)' }}>
              for <strong style={{ color: PM.coral }}>{pet ? pet.name : app.petKey}</strong> · {app.household}
            </div>
          </div>
        </div>
      </div>

      {/* stage stepper */}
      <div style={{ padding: '14px 20px 4px' }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {APP_STAGES.map((s, i) => (
            <button key={s.key} onClick={() => setActiveStage(i)} style={{
              flex: 1, padding: '8px 6px', borderRadius: 12,
              background: i === activeStage ? PM.night : PM.white,
              color:      i === activeStage ? PM.cream : PM.inkSoft,
              border: i === activeStage ? 'none' : `1px solid ${PM.line}`,
              cursor: 'pointer',
              fontFamily: FONT_BODY, fontSize: 10, fontWeight: 600, letterSpacing: 0.2,
            }}>
              <div style={{ fontFamily: FONT_MONO, fontSize: 9, opacity: 0.65, marginBottom: 1 }}>0{i + 1}</div>
              {s.label}
            </button>
          ))}
        </div>
        <div style={{ marginTop: 8, fontFamily: FONT_BODY, fontSize: 11, color: PM.inkSoft }}>
          Stages are optional — skip ahead if you've already met in person.
        </div>
      </div>

      <div style={{ flex: 1, overflow: 'auto', padding: '12px 20px 120px' }}>
        {sm.key === 'pre-app'   && <PreAppPanel
            app={app}
            onDecline={() => setDecision('declined')}
            onApprove={() => {
              setDecision('approved');
              const idx = APP_STAGES.findIndex(s => s.key === 'approved');
              if (idx >= 0) setActiveStage(idx);
            }}
        />}
        {sm.key === 'scheduled' && <ScheduledPanel
            app={app}
            isSarah={isSarah}
            pickedSlot={pickedSlot} setPickedSlot={setPickedSlot}
            sentTime={sentTime} sentAccepted={sentAccepted}
        />}
        {sm.key === 'meeting'   && <MeetingPanel  app={app}/>}
        {sm.key === 'approved'  && <ApprovedPanel app={app}/>}

        {decision && (
          <div style={{
            marginTop: 16, padding: 14, borderRadius: 18,
            background: decision === 'approved' ? '#E6F8EF' : '#FFE9EE',
            borderLeft: `3px solid ${decision === 'approved' ? PM.mint : PM.coral}`,
            fontFamily: FONT_BODY, fontSize: 13, color: PM.ink,
          }}>
            <strong>
              {decision === 'approved' ? 'Adoption approved.' : 'Application declined.'}
            </strong>
            {decision === 'approved'
              ? " We've sent next-step instructions to the applicant."
              : ' The applicant has been notified with a gentle note.'}
          </div>
        )}
      </div>

      {/* sticky decision bar — stage-aware */}
      <ReviewBottomBar
        stageKey={sm.key}
        app={app}
        isSarah={isSarah}
        pickedSlot={pickedSlot}
        sentTime={sentTime}
        sentAccepted={sentAccepted}
        onMessage={() => { setTab('chat'); goto('chatThread', { pet: app.petKey }); }}
        onNext={() => {
          if (activeStage < APP_STAGES.length - 1) setActiveStage(activeStage + 1);
        }}
        onDecline={() => setDecision('declined')}
        onApprove={() => {
          setDecision('approved');
          // Jump the stepper to Approved so the panel + bar update immediately.
          const idx = APP_STAGES.findIndex(s => s.key === 'approved');
          if (idx >= 0) setActiveStage(idx);
        }}
        onSendMeeting={() => {
          if (!pickedSlot) return;
          if (isSarah && window.__pmDemoActions) {
            window.__pmDemoActions.sendMeeting(pickedSlot);
          }
        }}
        onCancelMeeting={() => {
          setPickedSlot(null);
          if (isSarah && window.__pmDemoActions) {
            window.__pmDemoActions.cancelMeeting();
          }
        }}
        onReschedule={() => {
          // Reset the sent state and let the user re-pick.  Keep panel open.
          if (isSarah && window.__pmDemoActions) {
            window.__pmDemoActions.cancelMeeting();
          }
        }}
      />
    </div>
  );
}

// ─── Stage-aware sticky bottom bar ──────────────────────────

function ReviewBottomBar(props) {
  const {
    stageKey, isSarah, pickedSlot, sentTime, sentAccepted,
    onMessage, onNext, onDecline, onApprove,
    onSendMeeting, onCancelMeeting, onReschedule,
  } = props;

  const bar = (children) => (
    <div style={{
      position: 'absolute', left: 0, right: 0, bottom: 0,
      padding: '12px 20px 28px', background: '#FFFFFFF2',
      borderTop: `1px solid ${PM.line}`,
      display: 'flex', gap: 8,
    }}>{children}</div>
  );

  const messageBtn = (
    <button onClick={onMessage} style={{
      flex: 1, height: 50, borderRadius: 25,
      background: 'transparent', color: PM.night, border: `1.5px solid ${PM.ink}`,
      fontFamily: FONT_BODY, fontSize: 14, fontWeight: 600, cursor: 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
    }}>
      <svg width="14" height="14" viewBox="0 0 22 22" fill="none">
        <path d="M4 6 Q 4 4, 6 4 L 16 4 Q 18 4, 18 6 L 18 13 Q 18 15, 16 15 L 9 15 L 5 18 L 5 15 Q 4 15, 4 13 Z" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinejoin="round"/>
      </svg>
      Message
    </button>
  );
  const declineBtn = (
    <button onClick={onDecline} style={{
      flex: 1, height: 50, borderRadius: 25,
      background: 'transparent', color: PM.inkSoft, border: `1.5px solid ${PM.line}`,
      fontFamily: FONT_BODY, fontSize: 14, fontWeight: 600, cursor: 'pointer',
    }}>Decline</button>
  );
  const approveBtn = (
    <button onClick={onApprove} style={{
      flex: 1.6, height: 50, borderRadius: 25,
      background: PM.coral, color: '#FFF', border: 'none',
      fontFamily: FONT_BODY, fontSize: 14, fontWeight: 600, cursor: 'pointer',
      boxShadow: '0 6px 16px rgba(255,0,131,0.34)',
    }}>Approve →</button>
  );

  if (stageKey === 'pre-app') {
    // Decline / Approve live inside the panel now; the bar just moves on.
    const nextBtn = (
      <button key="n" onClick={onNext} style={{
        flex: 1.6, height: 50, borderRadius: 25,
        background: PM.night, color: PM.cream, border: 'none',
        fontFamily: FONT_BODY, fontSize: 14, fontWeight: 600, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        boxShadow: '0 6px 16px rgba(0,0,0,0.18)',
      }}>Next →</button>
    );
    return bar([
      React.cloneElement(messageBtn, { key: 'm' }),
      nextBtn,
    ]);
  }

  if (stageKey === 'scheduled') {
    let middle;
    if (sentTime) {
      // After sending the time, split the middle slot into Reschedule + Cancel.
      middle = (
        <div key="middle" style={{ flex: 1.6, display: 'flex', gap: 6 }}>
          <button onClick={onReschedule} style={{
            flex: 1, height: 50, borderRadius: 25,
            background: PM.night, color: PM.cream, border: 'none',
            fontFamily: FONT_BODY, fontSize: 12, fontWeight: 600, cursor: 'pointer',
          }}>Reschedule</button>
          <button onClick={onCancelMeeting} style={{
            flex: 1, height: 50, borderRadius: 25,
            background: 'transparent', color: PM.inkSoft, border: `1.5px solid ${PM.line}`,
            fontFamily: FONT_BODY, fontSize: 12, fontWeight: 500, cursor: 'pointer',
          }}>Cancel</button>
        </div>
      );
    } else {
      const canSend = !!pickedSlot;
      middle = (
        <button key="middle" onClick={onSendMeeting} disabled={!canSend} style={{
          flex: 1.6, height: 50, borderRadius: 25,
          background: canSend ? PM.coral : '#FFB8DA', color: '#FFF', border: 'none',
          cursor: canSend ? 'pointer' : 'not-allowed',
          fontFamily: FONT_BODY, fontSize: 14, fontWeight: 600,
          boxShadow: canSend ? '0 6px 16px rgba(255,0,131,0.34)' : 'none',
        }}>
          {canSend ? 'Send meeting time →' : 'Pick a slot ↑'}
        </button>
      );
    }
    return bar([
      React.cloneElement(messageBtn, { key: 'm' }),
      middle,
      React.cloneElement(declineBtn, { key: 'd' }),
    ]);
  }

  if (stageKey === 'meeting') return bar([
    React.cloneElement(messageBtn, { key: 'm' }),
    React.cloneElement(declineBtn, { key: 'd' }),
    React.cloneElement(approveBtn, { key: 'a' }),
  ]);

  if (stageKey === 'approved') return bar([
    React.cloneElement(messageBtn, { key: 'm', style: {
      ...messageBtn.props.style,
      flex: 1, background: PM.mint + '15', color: '#1E8A5A', border: `1.5px solid ${PM.mint}`,
    }}),
  ]);

  return bar([]);
}

function ReviewSection({ title, hint, children }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8 }}>
        <div style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.night, fontWeight: 700 }}>{title}</div>
        {hint && <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: PM.inkFaint, letterSpacing: 0.4, textTransform: 'uppercase' }}>{hint}</div>}
      </div>
      <div style={{ background: PM.white, borderRadius: 16, padding: 14, boxShadow: '0 1px 3px rgba(20,20,40,0.04)' }}>{children}</div>
    </div>
  );
}

function FactRow({ label, value, last }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', gap: 14,
      padding: '8px 0', borderBottom: last ? 'none' : `1px solid ${PM.lineSoft}`,
    }}>
      <span style={{ fontFamily: FONT_BODY, fontSize: 12, color: PM.inkSoft, flexShrink: 0 }}>{label}</span>
      <span style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.ink, fontWeight: 500, textAlign: 'right' }}>{value}</span>
    </div>
  );
}

function QABlock({ q, a }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: PM.coral, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700, marginBottom: 4 }}>{q}</div>
      <div style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.ink, lineHeight: 1.5 }}>{a}</div>
    </div>
  );
}

function PreAppPanel({ app, onDecline, onApprove }) {
  const p = app.preApp || {};
  return (
    <>
      <ReviewSection title="Pre-screening answers">
        <QABlock q="Why adopt now?"        a={p.whyAdopt || '—'}/>
        <QABlock q="Favorite thing about this pet" a={p.favorite || '—'}/>
        <QABlock q="Why you're a fit"       a={p.fit || '—'}/>
      </ReviewSection>
      <ReviewSection title="Quick facts">
        <FactRow label="Household" value={app.household}/>
        <FactRow label="Location"  value={app.location}/>
        <FactRow label="Submitted" value={`${app.age} ago`} last/>
      </ReviewSection>

      {/* Inline Decline / Approve so the reviewer can decide right here. */}
      <div style={{
        marginTop: 4, padding: 14, borderRadius: 18,
        background: PM.white, boxShadow: '0 1px 3px rgba(20,20,40,0.04)',
      }}>
        <div style={{ fontFamily: FONT_BODY, fontSize: 12, color: PM.inkSoft, marginBottom: 10 }}>
          Make a quick call now, or tap <strong style={{ color: PM.night }}>Next →</strong> to
          schedule a meet & greet first.
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button onClick={onDecline} style={{
            flex: 1, height: 44, borderRadius: 22,
            background: 'transparent', color: PM.inkSoft, border: `1.5px solid ${PM.line}`,
            cursor: 'pointer', fontFamily: FONT_BODY, fontSize: 13, fontWeight: 600,
          }}>Decline</button>
          <button onClick={onApprove} style={{
            flex: 1.4, height: 44, borderRadius: 22,
            background: PM.coral, color: '#FFF', border: 'none', cursor: 'pointer',
            fontFamily: FONT_BODY, fontSize: 13, fontWeight: 700,
            boxShadow: '0 4px 12px rgba(255,0,131,0.30)',
          }}>Approve adoption →</button>
        </div>
      </div>
    </>
  );
}

function ScheduledPanel({ app, isSarah, pickedSlot, setPickedSlot, sentTime, sentAccepted }) {
  const slots = ['Sat Apr 12 · 2:00 PM','Sun Apr 13 · 11:00 AM','Wed Apr 16 · 5:30 PM','Sat Apr 19 · 2:00 PM'];
  return (
    <>
      {/* Status card — shows whenever a meeting time has been sent */}
      {sentTime && (
        <div style={{
          padding: 16, borderRadius: 18, marginBottom: 14,
          background: sentAccepted ? '#E6F8EF' : `${PM.gold}1F`,
          borderLeft: `3px solid ${sentAccepted ? PM.mint : PM.gold}`,
        }}>
          <div style={{
            fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700,
            color: sentAccepted ? '#1E6B4D' : '#9A6A00',
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{
              width: 8, height: 8, borderRadius: 4,
              background: sentAccepted ? PM.mint : PM.gold,
            }}/>
            {sentAccepted ? 'Adopter confirmed' : 'Sent · awaiting confirmation'}
          </div>
          <div style={{ marginTop: 6, fontFamily: FONT_DISPLAY, fontSize: 20, color: PM.night, letterSpacing: -0.3 }}>
            {sentTime}
          </div>
          <div style={{ marginTop: 2, fontFamily: FONT_BODY, fontSize: 12, color: PM.inkSoft }}>
            {sentAccepted
              ? `${app.applicant} confirmed — we'll send a calendar invite and directions automatically.`
              : `${app.applicant} will see this on their adopter app — they can accept or request a different time.`}
          </div>
        </div>
      )}

      <ReviewSection title="Schedule a meet & greet" hint="In-person">
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {slots.map(s => {
            const isSent     = sentTime === s;
            const isSelected = pickedSlot === s;
            return (
              <Chip key={s}
                selected={isSent || isSelected}
                onClick={() => {
                  // Don't reshuffle the selection if a meeting time is already out
                  if (sentTime) return;
                  setPickedSlot && setPickedSlot(s);
                }}
              >
                {isSent ? '● ' : ''}{s}
              </Chip>
            );
          })}
        </div>
        <div style={{ marginTop: 12, fontFamily: FONT_BODY, fontSize: 12, color: PM.inkSoft, lineHeight: 1.5 }}>
          {sentTime
            ? 'Use Reschedule below to pick a different slot, or Cancel to retract this proposal.'
            : 'Pick a slot, then tap Send meeting time. The applicant gets a push notification with Accept / Suggest new time.'}
        </div>
      </ReviewSection>

      <ReviewSection title="Pre-screening summary">
        <FactRow label="Household" value={app.household}/>
        <FactRow label="Location"  value={app.location}/>
        <FactRow label="Lives with kids" value={(app.fullForm && app.fullForm.children) || '—'} last/>
      </ReviewSection>
    </>
  );
}

function MeetingPanel({ app }) {
  const f = app.fullForm || {};
  return (
    <>
      <ReviewSection title="Household & home">
        <FactRow label="Adults"   value={f.adults || '—'}/>
        <FactRow label="Children" value={f.children || '—'}/>
        <FactRow label="Home"     value={f.home || '—'}/>
        <FactRow label="Yard"     value={f.yard || '—'}/>
        <FactRow label="Other pets" value={f.otherPets || '—'} last/>
      </ReviewSection>
      <ReviewSection title="Daily routine">
        <div style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.ink, lineHeight: 1.5 }}>
          {f.routine || '—'}
        </div>
      </ReviewSection>
      <ReviewSection title="Vet contact" hint={f.vet && f.vet.inNetwork ? 'In-network' : 'Out-of-net'}>
        <FactRow label="Clinic" value={f.vet ? f.vet.name : '—'}/>
        <FactRow label="Doctor" value={f.vet ? f.vet.dr : '—'} last/>
      </ReviewSection>
      <ReviewSection title="Experience">
        <div style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.ink, lineHeight: 1.5 }}>
          {f.experience || '—'}
        </div>
      </ReviewSection>
    </>
  );
}

function ApprovedPanel({ app }) {
  const checks = app.aiChecks || [];
  return (
    <>
      <ReviewSection title="AI verification" hint="Lemonade powered">
        {checks.map((c, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0',
            borderBottom: i === checks.length - 1 ? 'none' : `1px solid ${PM.lineSoft}` }}>
            <span style={{
              width: 22, height: 22, borderRadius: 11,
              background: c.ok ? PM.mint : PM.coral, color: '#FFF',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: FONT_BODY, fontSize: 12, fontWeight: 700,
            }}>{c.ok ? '✓' : '!'}</span>
            <span style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.ink }}>{c.label}</span>
          </div>
        ))}
      </ReviewSection>
      {app.insurance && (
        <ReviewSection title="Insurance" hint={app.insurance.active ? 'Active' : 'Pending'}>
          <FactRow label="Plan" value={`${app.insurance.provider} · $${app.insurance.monthly}/mo`} last/>
        </ReviewSection>
      )}
      {app.vetVisit && (
        <ReviewSection title="First vet visit" hint={app.vetVisit.confirmed ? 'Confirmed' : 'Pending'}>
          <FactRow label="Clinic" value={app.vetVisit.clinic}/>
          <FactRow label="When"   value={app.vetVisit.when} last/>
        </ReviewSection>
      )}
      {app.homeVisit && (
        <ReviewSection title="Home visit" hint={app.homeVisit.completed ? 'Complete' : 'Scheduled'}>
          <FactRow label="When"  value={app.homeVisit.scheduled || '—'}/>
          {app.homeVisit.notes && <FactRow label="Notes" value={app.homeVisit.notes} last/>}
        </ReviewSection>
      )}
    </>
  );
}

Object.assign(window, { ShelterFormsScreen, ShelterAppReviewScreen });

</script>

function ShelterChatRow({ who, sub, preview, age, unread, petKey, onClick }) {

  const Art = pet && pet.Art;
  return (
    <button onClick={onClick} style={{
      width: '100%', display: 'flex', gap: 12, padding: '12px 20px', alignItems: 'center',
      background: 'transparent', border: 'none', borderBottom: `1px solid ${PM.lineSoft}`,
      cursor: 'pointer', textAlign: 'left',

      <div style={{
        width: 50, height: 50, borderRadius: 25, flexShrink: 0,

        display: 'flex', alignItems: 'center', justifyContent: 'center',

  <script type="text/babel" data-source="app-shelter.jsx">
/* app-shelter.jsx */
// app-shelter.jsx — Shelter / breeder app shell.

function ShelterTabBar({ active, onChange }) {
  const tabs = [
    { id: 'home',  label: 'Home',  icon: 'home'  },
    { id: 'pets',  label: 'Pets',  icon: 'paw'   },
    { id: 'forms', label: 'Forms', icon: 'forms' },
    { id: 'chat',  label: 'Chat',  icon: 'chat'  },
    { id: 'me',    label: 'Me',    icon: 'me'    },
  ];
  const Icon = ({ name, on }) => {
    const c = on ? PM.night : PM.inkFaint;
    const sw = 1.8;
    switch (name) {
      case 'home': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M3 10 L 11 3 L 19 10 L 19 19 L 13 19 L 13 13 L 9 13 L 9 19 L 3 19 Z"
                stroke={c} strokeWidth={sw} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      );
      case 'paw': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="6" cy="7" r="1.8" fill={c}/>
          <circle cx="11" cy="5" r="2" fill={c}/>
          <circle cx="16" cy="7" r="1.8" fill={c}/>
          <circle cx="17.5" cy="12" r="1.5" fill={c}/>
          <circle cx="4.5" cy="12" r="1.5" fill={c}/>
          <path d="M11 9 C 7.5 9, 6 12, 7 14.5 C 8 17, 9.5 18, 11 18 C 12.5 18, 14 17, 15 14.5 C 16 12, 14.5 9, 11 9 Z" fill={c}/>
        </svg>
      );
      case 'forms': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="4" y="3" width="14" height="16" rx="2" stroke={c} strokeWidth={sw} fill={on ? PM.coralSoft : 'none'}/>
          <path d="M7 8 L 15 8 M 7 11 L 15 11 M 7 14 L 12 14" stroke={c} strokeWidth={sw} strokeLinecap="round"/>
        </svg>
      );
      case 'chat': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M4 6 Q 4 4, 6 4 L 16 4 Q 18 4, 18 6 L 18 13 Q 18 15, 16 15 L 9 15 L 5 18 L 5 15 Q 4 15, 4 13 Z" stroke={c} strokeWidth={sw} fill="none" strokeLinejoin="round"/>
        </svg>
      );
      case 'me': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="8" r="3.5" stroke={c} strokeWidth={sw} fill="none"/>
          <path d="M4 19 Q 4 13, 11 13 Q 18 13, 18 19" stroke={c} strokeWidth={sw} fill="none" strokeLinecap="round"/>
        </svg>
      );
      default: return null;
    }
  };
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      paddingBottom: 22, paddingTop: 8,
      background: PM.paper, borderTop: `1px solid ${PM.line}`,
      display: 'flex', justifyContent: 'space-around', alignItems: 'flex-start',
      zIndex: 30,
    }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
          padding: '4px 8px',
        }}>
          <Icon name={t.icon} on={active === t.id}/>
          <span style={{
            fontFamily: FONT_BODY, fontSize: 10,
            color: active === t.id ? PM.night : PM.inkFaint,
            fontWeight: active === t.id ? 600 : 500,
            letterSpacing: 0.2,
          }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

function ShelterApp() {
  const [stack, setStack] = React.useState([{ name: 'splash', params: {} }]);
  const [tab, setTab] = React.useState('home');

  const current = stack[stack.length - 1];

  const goto = React.useCallback((name, params = {}) => {
    setStack(s => [...s, { name, params }]);
  }, []);
  const replace = React.useCallback((name, params = {}) => {
    setStack(s => [...s.slice(0, -1), { name, params }]);
  }, []);
  const back = React.useCallback(() => {
    setStack(s => s.length > 1 ? s.slice(0, -1) : s);
  }, []);

  const onTabChange = (id) => {
    setTab(id);
    const home = {
      home: 'home', pets: 'pets', forms: 'forms', chat: 'chat', me: 'me',
    }[id];
    setStack([{ name: home, params: {} }]);
  };

  let screen;
  switch (current.name) {
    case 'splash':       screen = <ShelterSplashScreen  onContinue={(go) => replace(go)}/>; break;
    case 'register':     screen = <ShelterRegisterScreen onBack={back} onContinue={(go) => { setTab('home'); replace(go); }}/>; break;
    case 'login':        screen = <ShelterLoginScreen   onBack={back} onContinue={(go) => { setTab('home'); replace(go); }}/>; break;

    case 'home':         screen = <ShelterHomeScreen    goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'pets':         screen = <ShelterPetsScreen    goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'petDetail': {
      const pet = (SHELTER_PETS || []).find(p => p.key === current.params?.pet);
      screen = <ShelterPetDetailScreen pet={pet} onBack={back}/>; break;
    }
    case 'forms':        screen = <ShelterFormsScreen   goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'appReview': {
      const app = (APPLICATIONS || []).find(a => a.id === current.params?.id);
      screen = <ShelterAppReviewScreen app={app} onBack={back} goto={(n,p)=>goto(n,p)} setTab={onTabChange}/>; break;
    }
    case 'chat':         screen = <ShelterChatScreen    goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'chatThread': {
      const c = (SHELTER_CHATS || []).find(x => x.petKey === current.params?.pet) || SHELTER_CHATS[0];
      screen = <ShelterChatThreadScreen conv={c} onBack={back}/>; break;
    }
    case 'me':           screen = <ShelterMeScreen      goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;

    default: screen = <div style={{ padding: 40, fontFamily: FONT_BODY }}>Unknown screen: {current.name}</div>;
  }
  return screen;
}

Object.assign(window, { ShelterApp, ShelterTabBar });

</script>

  <script type="text/babel">
    function Stage() {
      const ref = React.useRef(null);
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        const onResize = () => {
          const W = 402, H = 874;
          const vw = window.innerWidth - 40;
          const vh = window.innerHeight - 40;
          setScale(Math.min(vw / W, vh / H, 1.05));
        };
        onResize();
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      return (
        <div ref={ref} className="stage" style={{ transform: `scale(${scale})` }}>
          <IOSDevice width={402} height={874}>
            <div style={{ position: 'absolute', inset: 0 }}>
              <ShelterApp/>
            </div>
          </IOSDevice>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Stage/>);
  </script>
</body>
