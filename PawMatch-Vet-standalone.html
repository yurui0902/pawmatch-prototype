  <script type="text/babel" data-source="ios-frame.jsx">
/* ios-frame.jsx */

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>

      <div style={{

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

    <div style={{ padding: 18, borderRadius: 22, background: PM.white, boxShadow: '0 1px 3px rgba(20,20,40,0.04)' }}>

              <div style={{
                width: '100%',

function MonthGrid() {
  const dows = ['S','M','T','W','T','F','S'];
  return (
    <div style={{ padding: 18, borderRadius: 22, background: PM.white, boxShadow: '0 1px 3px rgba(20,20,40,0.04)' }}>

        <div style={{ fontFamily: FONT_DISPLAY, fontSize: 22, color: PM.night, letterSpacing: -0.3 }}>April 2026</div>
        <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: PM.inkSoft, letterSpacing: 0.4 }}>156 total</div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 6 }}>
        {dows.map((d, i) => (
          <div key={i} style={{

            padding: '4px 0',
          }}>{d}</div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {MONTH_VIEW_DATES.map((d, i) => {
          if (d.blank) return <div key={i}/>;
          const bg = d.today ? PM.coral :
                     d.closed ? 'transparent' :
                     d.density === 3 ? `${PM.coral}AA` :
                     d.density === 2 ? `${PM.coral}66` :
                     d.density === 1 ? `${PM.coral}24` :
                     'transparent';
          const fg = d.today ? '#FFF' : d.closed ? PM.inkFaint : PM.night;
          return (
            <div key={i} style={{
              aspectRatio: '1 / 1', borderRadius: 8, background: bg,
              border: d.today ? `1.5px solid ${PM.coral}` : 'none',

      </div>
    </div>
  );
}

function DensityLegend({ label, pct }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>

    </div>
  );
}

            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

            <div style={{ fontFamily: FONT_BODY, fontSize: 12, color: PM.inkSoft, fontWeight: 600, marginBottom: 8 }}>Time</div>

                  fontFamily: FONT_BODY, fontSize: 14, fontWeight: 600,
                }}>{t}</button>

              {reasons.map(r => <Chip key={r} selected={reason === r} onClick={() => setReason(r)}>{r}</Chip>)}

            </div>
          </>

      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0,

        display: 'flex', gap: 8,

          <button onClick={() => setStep(s => s - 1)} style={{

            fontFamily: FONT_BODY, fontSize: 14, fontWeight: 600,
            cursor: (step === 1 && !patient) ? 'not-allowed' : 'pointer',
            boxShadow: '0 6px 16px rgba(255,0,131,0.32)',
          }}>{step < 3 ? 'Next →' : 'Confirm & book'}</button>
      </div>
    </div>

    a[f] = f === 'All' ? CLAIMS.length : CLAIMS.filter(c => c.status === f).length;

  const list = seg === 'All' ? CLAIMS : CLAIMS.filter(c => c.status === seg);

      <div style={{ flex: 1, overflow: 'auto', padding: '12px 20px 110px', display: 'flex', flexDirection: 'column', gap: 10 }}>

          <ClaimRow key={c.id} claim={c}
            onClick={() => goto(c.status === 'Pending' ? 'claimTimeline' : 'claimPreview', { id: c.id })}/>
        ))}
      </div>

      <VetTabBar active={tab} onChange={setTab}/>
    </div>
  );

function VetClaimTimelineScreen({ claim, onBack }) {
  if (!claim) return <div style={{ position: 'absolute', inset: 0, background: PM.cream, padding: 40 }}>Not found. <button onClick={onBack}>Back</button></div>;
  const tl = claim.timeline || [
    { label: 'Submitted',    when: claim.submittedAge, done: claim.status !== 'Draft' },
    { label: 'Under review', when: '—', done: claim.status === 'Approved' },
    { label: 'Decision',     when: claim.status,        done: claim.status === 'Approved' || claim.status === 'Denied' },
    { label: 'Payout',       when: claim.status === 'Approved' ? `$${claim.payout.toFixed(2)}` : '—', done: claim.status === 'Approved' },
  ];
  const b = CLAIM_BADGE[claim.status] || CLAIM_BADGE.Pending;

  return (
    <div style={{ position: 'absolute', inset: 0, background: PM.cream, display: 'flex', flexDirection: 'column' }}>
      <TopBar title={claim.id} onBack={onBack}
        right={<div style={{
          padding: '4px 10px', borderRadius: 11, background: b.bg, color: b.fg,
          fontFamily: FONT_MONO, fontSize: 10, letterSpacing: 0.6, textTransform: 'uppercase', fontWeight: 700,
        }}>{claim.status}</div>}
      />

      <div style={{ flex: 1, overflow: 'auto', padding: '4px 20px 24px' }}>
        <h1 style={{ margin: '6px 0 4px', fontFamily: FONT_DISPLAY, fontSize: 30, fontWeight: 400, color: PM.night, letterSpacing: -0.6, lineHeight: 1.05 }}>
          {claim.petName}'s claim
        </h1>
        <div style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.inkSoft, marginBottom: 18 }}>
          {claim.visit} · {claim.provider}
        </div>

        <div style={{ position: 'relative', paddingLeft: 28, marginBottom: 22 }}>
          <div style={{
            position: 'absolute', top: 14, bottom: 14, left: 12, width: 2, background: PM.line,
          }}/>
          {tl.map((step, i) => (
            <div key={i} style={{ position: 'relative', marginBottom: 18 }}>
              <div style={{
                position: 'absolute', left: -22, top: 4,
                width: 24, height: 24, borderRadius: 12,
                background: step.done ? PM.mint : PM.white,
                border: step.done ? 'none' : `2px solid ${PM.line}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: '#FFF',
              }}>
                {step.done ? (
                  <svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 6 L 4.5 8.5 L 9 3" stroke="#FFF" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                ) : (
                  <span style={{ width: 6, height: 6, borderRadius: 3, background: PM.line }}/>
                )}
              </div>
              <div style={{ paddingLeft: 14 }}>
                <div style={{ fontFamily: FONT_BODY, fontSize: 14, color: PM.night, fontWeight: 600 }}>{step.label}</div>
                <div style={{ marginTop: 2, fontFamily: FONT_MONO, fontSize: 11, color: PM.inkSoft, letterSpacing: 0.3 }}>{step.when}</div>
              </div>
            </div>
          ))}
        </div>

        <Section title="Snapshot">
          <Fact label="Total billed" value={`$${claim.amount.toFixed(2)}`}/>
          <Fact label="Owner copay"  value={`$${claim.copay.toFixed(2)}`}/>
          <Fact label="Expected payout" value={`$${claim.payout.toFixed(2)}`} last/>
        </Section>

        {claim.denialReason && (
          <Section title="Denial reason">
            <div style={{ fontFamily: FONT_BODY, fontSize: 13, color: PM.ink, lineHeight: 1.5 }}>
              {claim.denialReason}
            </div>
          </Section>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { VetClaimsScreen, VetClaimPreviewScreen, VetClaimTimelineScreen });

</script>

    switch (name) {
      case 'home': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M3 10 L 11 3 L 19 10 L 19 19 L 13 19 L 13 13 L 9 13 L 9 19 L 3 19 Z"
                stroke={c} strokeWidth={sw} fill="none" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      );
      case 'cal': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="5" width="16" height="14" rx="2" stroke={c} strokeWidth={sw} fill="none"/>
          <path d="M3 9 L 19 9" stroke={c} strokeWidth={sw}/>
          <path d="M7 3 L 7 6 M 15 3 L 15 6" stroke={c} strokeWidth={sw} strokeLinecap="round"/>
        </svg>
      );
      case 'rec': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="11" r="9" stroke={c} strokeWidth={sw} fill={on ? PM.coralSoft : 'none'}/>
          <circle cx="11" cy="11" r="3.6" fill={on ? PM.coral : c}/>
        </svg>
      );
      case 'dollar': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <path d="M11 3 L 11 19" stroke={c} strokeWidth={sw} strokeLinecap="round"/>
          <path d="M15 7 Q 14 5, 11 5 Q 7 5, 7 8 Q 7 10, 11 11 Q 15 12, 15 14 Q 15 17, 11 17 Q 8 17, 7 15"
                stroke={c} strokeWidth={sw} fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );
      case 'me': return (
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <circle cx="11" cy="8" r="3.5" stroke={c} strokeWidth={sw} fill="none"/>
          <path d="M4 19 Q 4 13, 11 13 Q 18 13, 18 19" stroke={c} strokeWidth={sw} fill="none" strokeLinecap="round"/>
        </svg>
      );
      default: return null;
    }
  };
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      paddingBottom: 22, paddingTop: 8,
      background: PM.paper, borderTop: `1px solid ${PM.line}`,
      display: 'flex', justifyContent: 'space-around', alignItems: 'flex-start', zIndex: 30,
    }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: '4px 8px',
        }}>
          <Icon name={t.icon} on={active === t.id}/>
          <span style={{
            fontFamily: FONT_BODY, fontSize: 10,
            color: active === t.id ? PM.night : PM.inkFaint,
            fontWeight: active === t.id ? 600 : 500, letterSpacing: 0.2,
          }}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

function VetApp() {
  const [stack, setStack] = React.useState([{ name: 'splash', params: {} }]);
  const [tab, setTab] = React.useState('home');
  const current = stack[stack.length - 1];

  const goto    = React.useCallback((name, params = {}) => setStack(s => [...s, { name, params }]), []);
  const replace = React.useCallback((name, params = {}) => setStack(s => [...s.slice(0, -1), { name, params }]), []);
  const back    = React.useCallback(() => setStack(s => s.length > 1 ? s.slice(0, -1) : s), []);

  const onTabChange = (id) => {
    setTab(id);
    const home = {
      home: 'home', calendar: 'appointmentsDay', record: 'notes', claims: 'claims', me: 'me',
    }[id];
    setStack([{ name: home, params: {} }]);
  };

  let screen;
  switch (current.name) {
    case 'splash':           screen = <VetSplashScreen onContinue={(go) => replace(go)}/>; break;
    case 'register':         screen = <VetRegisterScreen onBack={back} onContinue={(go) => { setTab('home'); replace(go); }}/>; break;
    case 'login':            screen = <VetLoginScreen onBack={back} onContinue={(go) => { setTab('home'); replace(go); }}/>; break;

    case 'home':             screen = <VetHomeScreen goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;

    case 'appointmentsDay':  screen = <VetAppointmentsScreen view="day"   goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'appointmentsWeek': screen = <VetAppointmentsScreen view="week"  goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'appointmentsMonth':screen = <VetAppointmentsScreen view="month" goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'appointmentDetail': {
      const apt = (APPOINTMENTS || []).find(a => a.id === current.params?.id) || APPOINTMENTS[0];
      screen = <VetAppointmentDetailScreen apt={apt} onBack={back} goto={(n,p)=>goto(n,p)}/>; break;
    }
    case 'appointmentNew':   screen = <VetAppointmentNewScreen onBack={back} onDone={() => { setTab('calendar'); setStack([{ name: 'appointmentsDay', params: {} }]); }}/>; break;
    case 'appointmentReschedule': {
      const apt = (APPOINTMENTS || []).find(a => a.id === current.params?.id) || APPOINTMENTS[0];
      screen = <VetAppointmentRescheduleScreen apt={apt} onBack={back}/>; break;
    }

    case 'notes':            screen = <VetNotesScreen goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'noteNew':          screen = <VetNoteNewScreen onBack={back} goto={(n,p)=>goto(n,p)}/>; break;
    case 'noteRecording':    screen = <VetNoteRecordingScreen onBack={back} onDone={() => replace('noteReview', { id: SOAP_DRAFT.noteId })}/>; break;
    case 'noteReview': {
      screen = <VetNoteReviewScreen note={SOAP_DRAFT} onBack={back} onSign={() => { setTab('claims'); setStack([{ name: 'claims', params: {} }]); }}/>; break;
    }

    case 'claims':           screen = <VetClaimsScreen goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;
    case 'claimPreview': {
      const c = (CLAIMS || []).find(x => x.id === current.params?.id) || CLAIMS[0];
      screen = <VetClaimPreviewScreen claim={c} onBack={back} goto={(n,p)=>goto(n,p)}/>; break;
    }
    case 'claimTimeline': {
      const c = (CLAIMS || []).find(x => x.id === current.params?.id) || CLAIMS[1];
      screen = <VetClaimTimelineScreen claim={c} onBack={back}/>; break;
    }

    case 'documents':        screen = <VetDocumentsScreen onBack={back}/>; break;
    case 'me':               screen = <VetMeScreen goto={(n,p)=>goto(n,p)} tab={tab} setTab={onTabChange}/>; break;

    default: screen = <div style={{ padding: 40, fontFamily: FONT_BODY }}>Unknown: {current.name}</div>;
  }
  return screen;
}

Object.assign(window, { VetApp, VetTabBar });

</script>

  <script type="text/babel">
    function Stage() {
      const ref = React.useRef(null);
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        const onResize = () => {
          const W = 402, H = 874;
          const vw = window.innerWidth - 40;
          const vh = window.innerHeight - 40;
          setScale(Math.min(vw / W, vh / H, 1.05));
        };
        onResize();
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      return (
        <div ref={ref} className="stage" style={{ transform: `scale(${scale})` }}>
          <IOSDevice width={402} height={874}>
            <div style={{ position: 'absolute', inset: 0 }}>
              <VetApp/>
            </div>
          </IOSDevice>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Stage/>);
  </script>
</body>
</html>
