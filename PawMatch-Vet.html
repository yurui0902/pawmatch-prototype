<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>PawMatch — Vet Clinic</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Geist', -apple-system, system-ui, sans-serif;
      background: #E8E0D0; color: #1F1F3A;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    body {
      background: #F2F2F2; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    button { font-family: inherit; }
    h1, h2, h3, p { margin: 0; }
    .stage { transform-origin: center center; transition: transform 0.2s; }
    *::-webkit-scrollbar { width: 0; height: 0; }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="pet-art.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="vet-data.jsx"></script>
  <script type="text/babel" src="screens-vet-auth.jsx"></script>
  <script type="text/babel" src="screens-vet-home.jsx"></script>
  <script type="text/babel" src="screens-vet-appointments.jsx"></script>
  <script type="text/babel" src="screens-vet-notes.jsx"></script>
  <script type="text/babel" src="screens-vet-claims.jsx"></script>
  <script type="text/babel" src="screens-vet-misc.jsx"></script>
  <script type="text/babel" src="app-vet.jsx"></script>

  <script type="text/babel">
    function Stage() {
      const ref = React.useRef(null);
      const [scale, setScale] = React.useState(1);
      React.useEffect(() => {
        const onResize = () => {
          const W = 402, H = 874;
          const vw = window.innerWidth - 40;
          const vh = window.innerHeight - 40;
          setScale(Math.min(vw / W, vh / H, 1.05));
        };
        onResize();
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      return (
        <div ref={ref} className="stage" style={{ transform: `scale(${scale})` }}>
          <IOSDevice width={402} height={874}>
            <div style={{ position: 'absolute', inset: 0 }}>
              <VetApp/>
            </div>
          </IOSDevice>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Stage/>);
  </script>
</body>
</html>
